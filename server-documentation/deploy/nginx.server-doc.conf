server {
    listen 8080;
    listen [::]:8080;

    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Basic hardening for static public docs
    autoindex off;
    server_tokens off;

    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Block hidden and sensitive files
    location ~ /\.(?!well-known).* {
        deny all;
        return 404;
    }

    location ~* /(\.git|\.env|\.htaccess|\.htpasswd|backups?|backup|private|secret|tmp|logs?) {
        deny all;
        return 404;
    }

    location ~* \.(bak|old|sql|swp|tmp|log)$ {
        deny all;
        return 404;
    }

    # Caching static assets improves performance and lowers attack surface on repeated requests.
    location ~* \.(?:css|js|jpg|jpeg|gif|png|svg|webp|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        access_log off;
    }
}
